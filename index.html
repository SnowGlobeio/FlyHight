<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BCBP Reader</title>
<script>
  // Application immédiate du thème (avant rendu) pour éviter le flash
  (function() {
    var saved = localStorage.getItem('bcbp-theme');
    if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0D1117;
    --surface: #161B27;
    --card: #1C2333;
    --border: #2A3348;
    --accent: #00C8FF;
    --accent-dim: rgba(0,200,255,0.12);
    --accent-dim2: rgba(0,200,255,0.06);
    --text: #E8EDF2;
    --text-muted: #6B7A99;
    --text-dim: #3D4F6E;
    --green: #22C55E;
    --amber: #F59E0B;
    --red: #EF4444;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  [data-theme="light"] {
    --bg: #F4F6FA;
    --surface: #FFFFFF;
    --card: #EEF1F6;
    --border: #D8DEE9;
    --accent: #0088CC;
    --accent-dim: rgba(0,136,204,0.10);
    --accent-dim2: rgba(0,136,204,0.05);
    --text: #1A2233;
    --text-muted: #5B6B85;
    --text-dim: #A4AEC2;
    --green: #16A34A;
    --amber: #D97706;
    --red: #DC2626;
  }

  body { transition: background 0.2s, color 0.2s; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding-bottom: 3rem;
  }

  /* ── HEADER ── */
  header {
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    font-size: 16px;
    position: relative;
  }
  .fly-easter-egg {
    position: absolute;
    bottom: -6px; right: -8px;
    font-size: 11px;
    transform: rotate(-10deg);
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.4));
    pointer-events: none;
  }

  .theme-toggle {
    margin-left: auto;
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.95rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
  header h1 {
    font-family: var(--mono);
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  header span {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── NAV TABS ── */
  .nav-tabs-center {
    display: flex; justify-content: center;
    margin-bottom: 1.5rem;
  }
  .nav-tabs {
    display: flex; gap: 0;
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  }
  .nav-tab {
    padding: 0.6rem 1.5rem;
    font-family: var(--mono); font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; border: none; background: var(--surface);
    color: var(--text-muted); transition: all 0.15s;
    border-right: 1px solid var(--border);
  }
  .nav-tab:last-child { border-right: none; }
  .nav-tab.active { background: var(--accent-dim); color: var(--accent); }
  .nav-tab:hover:not(.active) { color: var(--text); }

  /* ── SEGMENTS TABS ── */
  .seg-tabs {
    display: flex; gap: 0; margin-bottom: 1rem;
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .seg-tab {
    flex: 1; padding: 0.5rem;
    font-family: var(--mono); font-size: 0.68rem; font-weight: 600;
    letter-spacing: 0.04em; text-align: center;
    cursor: pointer; border: none; background: var(--surface);
    color: var(--text-muted); transition: all 0.15s;
    border-right: 1px solid var(--border);
  }
  .seg-tab:last-child { border-right: none; }
  .seg-tab.active { background: var(--accent-dim); color: var(--accent); }
  .seg-tab .seg-route { font-size: 0.6rem; font-weight: 400; opacity: 0.7; display: block; margin-top: 1px; }
  .gen-form { display: flex; flex-direction: column; gap: 1rem; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-row.trio { grid-template-columns: 1fr 1fr 1fr; }

  .form-field { display: flex; flex-direction: column; gap: 0.35rem; }
  .form-field label {
    font-family: var(--mono); font-size: 0.6rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted);
  }
  .form-field input, .form-field select {
    width: 100%; padding: 0.65rem 0.75rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: var(--mono); font-size: 0.82rem;
    outline: none; transition: border-color 0.15s;
  }
  .form-field input:focus, .form-field select:focus { border-color: var(--accent); }
  .form-field input::placeholder { color: var(--text-dim); }
  .form-field select option { background: var(--card); }
  .form-field input.upper { text-transform: uppercase; }

  .form-divider {
    border: none; border-top: 1px solid var(--border);
    margin: 0.25rem 0;
  }

  .gen-preview {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.85rem 1rem;
    font-family: var(--mono); font-size: 0.68rem;
    color: var(--text-muted); word-break: break-all;
    line-height: 1.7; min-height: 48px;
  }
  .gen-preview .label { color: var(--text-dim); font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 0.3rem; }

  .gen-qr-out {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.5rem; text-align: center;
  }
  .gen-qr-out h3 {
    font-family: var(--mono); font-size: 0.7rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 1rem;
  }
  #gen-qr-output { display: inline-block; padding: 1rem; background: #fff; border-radius: 12px; margin-bottom: 1rem; border: 1px solid var(--border); }

  main { max-width: 520px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* ── STEPS ── */
  .step-bar {
    display: flex; gap: 0; margin-bottom: 2rem;
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  }
  .step {
    flex: 1; padding: 0.65rem 0.5rem;
    text-align: center; font-size: 0.7rem;
    font-family: var(--mono); letter-spacing: 0.04em;
    color: var(--text-dim); background: var(--surface);
    border-right: 1px solid var(--border);
    transition: all 0.2s;
  }
  .step:last-child { border-right: none; }
  .step.active { color: var(--accent); background: var(--accent-dim2); }
  .step.done { color: var(--green); }
  .step-num { display: block; font-size: 0.6rem; margin-bottom: 2px; opacity: 0.6; }

  /* ── SCAN SECTION ── */
  .section-label {
    font-family: var(--mono); font-size: 0.65rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 0.75rem;
  }

  .scan-zone {
    border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    background: var(--surface);
    margin-bottom: 1rem;
  }
  #reader {
    width: 100% !important;
    border-radius: 0 !important;
    border: none !important;
  }
  #reader video { width: 100% !important; border-radius: 0 !important; }
  #reader img { display: none !important; }

  .scan-actions {
    display: flex; gap: 0.75rem; margin-bottom: 1.5rem;
  }
  .btn {
    flex: 1; padding: 0.8rem 1rem;
    border-radius: 10px; border: none; cursor: pointer;
    font-family: var(--mono); font-size: 0.8rem;
    font-weight: 600; letter-spacing: 0.04em;
    transition: all 0.15s; display: flex;
    align-items: center; justify-content: center; gap: 0.5rem;
  }
  .btn-primary {
    background: var(--accent); color: #0D1117;
  }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-secondary {
    background: var(--card); color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── MANUAL INPUT ── */
  .manual-block { margin-bottom: 1.5rem; }
  .manual-block textarea {
    width: 100%; padding: 0.85rem 1rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: var(--mono); font-size: 0.72rem;
    resize: vertical; min-height: 80px; outline: none;
    transition: border-color 0.15s;
  }
  .manual-block textarea:focus { border-color: var(--accent); }
  .manual-block textarea::placeholder { color: var(--text-dim); }

  /* ── BOARDING PASS CARD ── */
  .bp-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    margin-bottom: 1.5rem;
    position: relative;
  }
  .bp-header {
    background: var(--accent-dim);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .bp-header-left { }
  .bp-header-left .airline { font-size: 0.65rem; color: var(--accent); font-family: var(--mono); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.2rem; }
  .bp-header-left .passenger { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.03em; }
  .bp-status {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.65rem; font-family: var(--mono); color: var(--green);
    background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25);
    padding: 0.35rem 0.6rem; border-radius: 6px;
  }
  .bp-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; }

  /* Route */
  .bp-route {
    padding: 1.25rem 1.25rem 0;
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .bp-airport { text-align: center; flex: 1; }
  .bp-airport .code { font-family: var(--mono); font-size: 2rem; font-weight: 600; color: var(--accent); line-height: 1; }
  .bp-airport .city { font-size: 0.65rem; color: var(--text-muted); margin-top: 0.2rem; }
  .bp-arrow { flex: 2; display: flex; flex-direction: column; align-items: center; gap: 0.25rem; }
  .bp-arrow-line {
    width: 100%; height: 1px; background: linear-gradient(to right, var(--accent), transparent, var(--accent));
    position: relative;
  }
  .bp-arrow-line::after { content: '▶'; position: absolute; right: -4px; top: -6px; font-size: 10px; color: var(--accent); }
  .bp-arrow-label { font-family: var(--mono); font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.08em; }

  /* Perforation */
  .bp-perforation {
    display: flex; align-items: center; margin: 0 -1px;
    position: relative;
  }
  .bp-perforation::before, .bp-perforation::after {
    content: ''; width: 16px; height: 16px; border-radius: 50%;
    background: var(--bg); border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .bp-perf-line {
    flex: 1; border-top: 1px dashed var(--border); margin: 0 0.5rem;
  }

  /* Fields grid */
  .bp-fields {
    padding: 1rem 1.25rem 1.25rem;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .bp-field { }
  .bp-field.full { grid-column: 1/-1; }
  .bp-field label {
    display: block; font-size: 0.58rem; font-family: var(--mono);
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 0.3rem;
  }
  .bp-field .val {
    font-family: var(--mono); font-size: 0.88rem; font-weight: 600;
    color: var(--text); padding: 0.5rem 0.65rem;
    background: var(--card); border-radius: 7px;
    border: 1px solid var(--border);
  }
  .bp-field .val.editable {
    cursor: pointer; border: 1px solid var(--border);
    transition: border-color 0.15s, background 0.15s;
  }
  .bp-field .val.editable:hover { border-color: var(--accent); background: var(--accent-dim2); }
  .bp-field .val.locked {
    cursor: not-allowed; opacity: 0.55;
    border: 1px solid var(--border);
  }

  /* ── SECURITY BANNER ── */
  .security-banner {
    margin: 0 1.25rem 1rem;
    padding: 0.75rem 1rem;
    border-radius: 9px;
    display: flex; align-items: flex-start; gap: 0.6rem;
    font-size: 0.68rem; font-family: var(--mono); line-height: 1.6;
  }
  .security-banner.secured {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--red);
  }
  .security-banner.clear {
    background: rgba(34,197,94,0.07);
    border: 1px solid rgba(34,197,94,0.25);
    color: var(--green);
  }
  .security-banner .sec-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
  .security-banner strong { display: block; letter-spacing: 0.06em; margin-bottom: 0.1rem; }
  .bp-field input, .bp-field select {
    width: 100%; padding: 0.5rem 0.65rem;
    background: var(--card); border: 1px solid var(--accent);
    border-radius: 7px; color: var(--accent);
    font-family: var(--mono); font-size: 0.88rem; font-weight: 600;
    outline: none;
  }
  .bp-field select option { background: var(--card); color: var(--text); }
  .modified-badge {
    display: inline-block; font-size: 0.55rem; font-family: var(--mono);
    color: var(--amber); background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3); border-radius: 4px;
    padding: 1px 5px; margin-left: 0.4rem; vertical-align: middle;
    letter-spacing: 0.06em;
  }

  /* ── QR OUTPUT ── */
  .qr-section {
    background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 1.5rem; text-align: center; margin-bottom: 1.5rem;
  }
  .qr-section h3 {
    font-family: var(--mono); font-size: 0.7rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 1rem;
  }
  #qr-output {
    display: inline-block;
    padding: 1rem; background: #fff; border-radius: 12px;
    margin-bottom: 1rem; border: 1px solid var(--border);
  }
  #qr-output canvas, #qr-output img { display: block; }
  .qr-warning {
    font-size: 0.65rem; color: var(--amber);
    font-family: var(--mono); letter-spacing: 0.04em;
    background: rgba(245,158,11,0.07);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 8px; padding: 0.65rem 0.75rem;
    text-align: left; line-height: 1.6;
  }
  .qr-warning strong { color: var(--amber); }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }

  /* ── RAW DATA ── */
  .raw-block {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.85rem 1rem;
    margin-bottom: 1rem;
  }
  .raw-block pre {
    font-family: var(--mono); font-size: 0.68rem;
    color: var(--text-muted); word-break: break-all;
    white-space: pre-wrap; line-height: 1.7;
  }
  details summary {
    cursor: pointer; font-size: 0.65rem; font-family: var(--mono);
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-dim); padding: 0.5rem 0;
  }
  details summary:hover { color: var(--text-muted); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 0.65rem 1.1rem;
    border-radius: 10px; font-family: var(--mono); font-size: 0.75rem;
    z-index: 999; transition: opacity 0.3s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.hidden { opacity: 0; pointer-events: none; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* La classe .hidden force display:none */
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo-icon">✈<span class="fly-easter-egg" title="🪰">🪰</span></div>
  <div>
    <h1>BCBP READER <span>/ EDITOR</span></h1>
    <span>IATA Resolution 792 · v7</span>
  </div>
  <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Changer de thème" aria-label="Changer de thème">
    <span id="theme-icon">☾</span>
  </button>
</header>

<main>
  <!-- Nav tabs centrés -->
  <div class="nav-tabs-center">
    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-reader" onclick="switchTab('reader')">LIRE</button>
      <button class="nav-tab" id="tab-gen" onclick="switchTab('gen')">CRÉER</button>
    </div>
  </div>

  <!-- Steps -->
  <div class="step-bar">
    <div class="step active" id="step1"><span class="step-num">01</span>SCAN</div>
    <div class="step" id="step2"><span class="step-num">02</span>DONNÉES</div>
    <div class="step" id="step3"><span class="step-num">03</span>QR CODE</div>
  </div>

  <!-- ── SECTION SCAN ── -->
  <div id="section-scan">
    <p class="section-label">Scanner le code-barres</p>

    <div class="scan-zone" id="scan-zone">
      <div id="reader"></div>
    </div>

    <div class="scan-actions">
      <button class="btn btn-primary" id="btn-camera" onclick="startCamera()">📷 Caméra</button>
      <button class="btn btn-secondary" id="btn-image" onclick="document.getElementById('file-input').click()">🖼 Image</button>
      <button class="btn btn-secondary" id="btn-stop" onclick="stopCamera()" style="display:none">⏹ Stopper</button>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="scanFromFile(event)"/>

    <div class="manual-block">
      <p class="section-label">Ou coller la chaîne BCBP manuellement</p>
      <textarea id="manual-input" placeholder="M1DOE/JOHN            EABCDEF CDGLFOPK 0123 182Y00A 0046 147" oninput="document.getElementById('btn-analyser').disabled = !this.value.trim()"></textarea>
      <div class="scan-actions" style="margin-top:0.5rem">
        <button class="btn btn-secondary" id="btn-analyser" onclick="parseManual()" disabled>→ Analyser</button>
      </div>
    </div>
  </div>

  <!-- ── SECTION DONNÉES ── -->
  <div id="section-data" class="hidden">
    <p class="section-label">Données extraites <span id="modified-count" class="hidden"><span class="modified-badge">MODIFIÉ</span></span></p>

    <!-- Onglets segments (masqués si 1 seul segment) -->
    <div id="seg-tabs" class="seg-tabs hidden"></div>

    <!-- Carte embarquement — rendu dynamique -->
    <div id="bp-card" class="bp-card"></div>

    <details>
      <summary>Données brutes BCBP</summary>
      <div class="raw-block" style="margin-top:0.5rem">
        <pre id="raw-display">—</pre>
      </div>
    </details>

    <div class="scan-actions" style="margin-top:1.25rem">
      <button class="btn btn-secondary" onclick="reset()">↩ Nouveau scan</button>
      <button class="btn btn-primary" id="btn-generate-qr" onclick="generateQR()" disabled>⬇ Générer QR</button>
    </div>

  </div>

  <!-- ── SECTION QR ── -->
  <div id="section-qr" class="hidden">
    <p class="section-label">QR Code régénéré</p>

    <div class="qr-section">
      <h3>Code embarquement · BCBP</h3>
      <div id="qr-output"></div>
    </div>

    <div class="scan-actions">
      <button class="btn btn-secondary" onclick="backToData()">← Modifier</button>
      <button class="btn btn-primary" onclick="downloadQR()">💾 Télécharger</button>
    </div>
  </div>
  <!-- ── SECTION GÉNÉRATEUR ── -->
  <div id="section-gen" class="hidden">

    <p class="section-label">Nouveau billet</p>

    <div class="gen-form">

      <!-- Passager -->
      <div class="form-row">
        <div class="form-field">
          <label>Nom de famille</label>

<div class="toast hidden" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────
let bcbpData = {};
let rawString = '';
let modifiedFields = new Set();

// ─── DEMO DATA ───────────────────────────────────────────────────
function loadDemo() {
  // Exemple conforme IATA BCBP format M (mandatory fields)
  document.getElementById('manual-input').value =
    'M1DOE/JOHN            EABCDEF CDGLFOPK 0123 182Y012A00460 147';
  showToast('Exemple IATA chargé');
}

// ─── CAMERA (ZXing) ──────────────────────────────────────────────
let zxingReader = null;

function startCamera() {
  document.getElementById('btn-camera').style.display = 'none';
  document.getElementById('btn-image').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'flex';
  document.getElementById('scan-zone').style.display = 'block';

  // Préparer l'élément video
  let video = document.getElementById('zxing-video');
  if (!video) {
    video = document.createElement('video');
    video.id = 'zxing-video';
    video.style.cssText = 'width:100%;border-radius:0;display:block;';
    document.getElementById('reader').innerHTML = '';
    document.getElementById('reader').appendChild(video);
  }

  const hints = new Map();
  const formats = [
    ZXing.BarcodeFormat.PDF_417,
    ZXing.BarcodeFormat.QR_CODE,
    ZXing.BarcodeFormat.AZTEC,
    ZXing.BarcodeFormat.DATA_MATRIX
  ];
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

  zxingReader = new ZXing.BrowserMultiFormatReader(hints);

  zxingReader.decodeFromVideoDevice(null, 'zxing-video', (result, err) => {
    if (result) {
      stopCamera();
      rawString = result.getText();
      parseBCBP(rawString);
    }
    // err = pas encore de résultat, on continue
  }).catch(err => {
    showToast('Caméra non disponible : ' + err);
    resetCameraUI();
  });
}

function stopCamera() {
  if (zxingReader) {
    zxingReader.reset();
    zxingReader = null;
  }
  resetCameraUI();
}

function resetCameraUI() {
  document.getElementById('btn-camera').style.display = 'flex';
  document.getElementById('btn-image').style.display = 'flex';
  document.getElementById('btn-stop').style.display = 'none';
}

// ─── SCAN FROM IMAGE FILE (ZXing) ────────────────────────────────
function scanFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  showToast('⏳ Analyse de l\'image…');

  const hints = new Map();
  const formats = [
    ZXing.BarcodeFormat.PDF_417,
    ZXing.BarcodeFormat.QR_CODE,
    ZXing.BarcodeFormat.AZTEC,
    ZXing.BarcodeFormat.DATA_MATRIX
  ];
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

  const reader = new ZXing.BrowserMultiFormatReader(hints);
  const url = URL.createObjectURL(file);

  reader.decodeFromImageUrl(url)
    .then(result => {
      URL.revokeObjectURL(url);
      rawString = result.getText();
      parseBCBP(rawString);
    })
    .catch(() => {
      URL.revokeObjectURL(url);
      showToast('❌ Aucun code-barres détecté dans l\'image');
    });
}

// ─── MANUAL PARSE ────────────────────────────────────────────────
function parseManual() {
  const val = document.getElementById('manual-input').value.trim();
  if (!val) { showToast('Coller une chaîne BCBP d\'abord'); return; }
  rawString = val;
  parseBCBP(val);
}

// ─── BCBP PARSER (IATA Resolution 792 v7) ───────────────────────
// Support multi-segments (jusqu'à 4 legs)
function parseBCBP(str) {
  try {
    const s = str.trim();
    if (s.length < 30) throw new Error('Chaîne BCBP trop courte');
    if (s[0] !== 'M') throw new Error('Format non reconnu (doit commencer par M)');

    const totalLegs = parseInt(s[1]) || 1;
    const nameRaw   = s.substring(2, 22).trim();
    const nameParts = nameRaw.split('/');
    const lastName  = nameParts[0] ? nameParts[0].trim() : '—';
    const firstName = nameParts[1] ? nameParts[1].trim() : '';
    const fullName  = firstName ? `${firstName} ${lastName}` : lastName;
    const eTicket   = s[22] || ' ';

    // ── Segment 1 — champs mandatoires fixes ──────────────────────
    // pos 23-29: PNR (7)
    // pos 30-32: origin (3)
    // pos 33-35: dest (3)
    // pos 36-38: carrier (3)
    // pos 39-43: flight (5)
    // pos 44-46: julian (3)
    // pos 47   : cabin (1)
    // pos 48-51: seat (4)
    // pos 52-56: seq (5)
    // pos 57   : pax status (1)
    // pos 58-59: field size variable (2 hex)
    const seg1 = {
      pnr     : s.substring(23, 30).trim(),
      origin  : s.substring(30, 33).trim(),
      dest    : s.substring(33, 36).trim(),
      carrier : s.substring(36, 39).trim(),
      flight  : s.substring(39, 44).trim(),
      julian  : s.substring(44, 47).trim(),
      cabin   : s[47] || ' ',
      seat    : s.substring(48, 52).trim(),
      seq     : s.substring(52, 57).trim(),
      status  : s[57] || ' ',
      fastTrack: ' ',
    };

    const varSize   = parseInt(s.substring(58, 60), 16) || 0;
    const condStart = 60;

    // ── Parsing du bloc conditionnel ──────────────────────────────
    let issueDate     = '—';
    let issuerAirline = '—';
    let ticketNum     = '—';
    let hasSecurityKey = false;
    let securityType  = '';
    let pos = condStart;

    if (s.length > condStart && s[condStart] === '>') {
      pos += 1; // skip '>'
      pos += 1; // skip version

      // Bloc unique (items 15, 12, 14, 22, 21, 23)
      const uniqueSize = parseInt(s.substring(pos, pos + 2), 16) || 0;
      pos += 2;
      if (uniqueSize > 0 && s.length >= pos + uniqueSize) {
        const uniq = s.substring(pos, pos + uniqueSize);
        pos += uniqueSize;
        let u = 3; // skip items 15, 12, 14
        if (uniq.length >= u + 4) {
          const rawDate  = uniq.substring(u, u + 4); u += 4;
          const yearD    = rawDate[0];
          const dayNum   = parseInt(rawDate.substring(1, 4), 10);
          if (!isNaN(dayNum) && dayNum >= 1 && dayNum <= 366) {
            const year = 2010 + ((parseInt(yearD) + 10 - (new Date().getFullYear() % 10)) % 10);
            const d = new Date(year, 0, dayNum);
            issueDate = d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
          }
        }
        if (uniq.length >= u + 3) { issuerAirline = uniq.substring(u, u + 3).trim(); u += 3; }
        if (uniq.length >= u + 13) { const t = uniq.substring(u, u + 13).trim(); if (t) ticketNum = t; }
      }

      // Bloc répété segment 1
      if (s.length >= pos + 2) {
        const repSize = parseInt(s.substring(pos, pos + 2), 16) || 0;
        pos += 2;
        if (repSize > 0 && s.length >= pos + repSize) {
          const rep = s.substring(pos, pos + repSize);
          pos += repSize;
          if (rep.length >= 12) seg1.fastTrack = rep[11] || ' ';
        }
      }
    }

    // ── Segments 2, 3, 4 ─────────────────────────────────────────
    const segments = [seg1];

    for (let leg = 2; leg <= totalLegs; leg++) {
      if (pos + 37 > s.length) break;

      const seg = {};
      seg.pnr     = s.substring(pos, pos + 7).trim(); pos += 7;
      seg.origin  = s.substring(pos, pos + 3).trim(); pos += 3;
      seg.dest    = s.substring(pos, pos + 3).trim(); pos += 3;
      seg.carrier = s.substring(pos, pos + 3).trim(); pos += 3;
      seg.flight  = s.substring(pos, pos + 5).trim(); pos += 5;
      seg.julian  = s.substring(pos, pos + 3).trim(); pos += 3;
      seg.cabin   = s[pos] || ' ';                    pos += 1;
      seg.seat    = s.substring(pos, pos + 4).trim(); pos += 4;
      seg.seq     = s.substring(pos, pos + 5).trim(); pos += 5;
      seg.status  = s[pos] || ' ';                    pos += 1;
      seg.fastTrack = ' ';

      // Field size conditionnel de ce leg (2 hex)
      if (pos + 2 <= s.length) {
        const legCondSize = parseInt(s.substring(pos, pos + 2), 16) || 0;
        pos += 2;
        if (legCondSize > 0 && pos + legCondSize <= s.length) {
          const legCond = s.substring(pos, pos + legCondSize);
          pos += legCondSize;
          // Bloc répété de ce leg : field size (2 hex) + données
          if (legCond.length >= 2) {
            const legRepSize = parseInt(legCond.substring(0, 2), 16) || 0;
            if (legRepSize >= 12 && legCond.length >= 2 + legRepSize) {
              const legRep = legCond.substring(2, 2 + legRepSize);
              seg.fastTrack = legRep[11] || ' ';
            }
          }
        }
      }

      segments.push(seg);
    }

    // ── Détection clé de sécurité ──
    const secIdx = Math.max(s.lastIndexOf('^'), s.lastIndexOf('*'));
    if (secIdx > 50) { hasSecurityKey = true; securityType = s[secIdx] || '?'; }

    bcbpData = {
      totalLegs, fullName, lastName, firstName, eTicket,
      segments,
      pnr: seg1.pnr || '—',
      ticketNum, issueDate, issuerAirline,
      hasSecurityKey, securityType,
      raw: s,
      // Compat segment actif (pour generateQR)
      activeSegIdx: 0,
    };

    modifiedFields = new Set();
    displayData();
    setStep(2);
    showToast('✓ BCBP analysé — ' + totalLegs + ' segment(s)');

  } catch(e) {
    showToast('❌ ' + e.message);
  }
}

// ─── DISPLAY ─────────────────────────────────────────────────────
function renderCard(segIdx) {
  const d   = bcbpData;
  const seg = d.segments[segIdx];
  const locked = d.hasSecurityKey;

  const ftLabel = (ft) => {
    const v = (ft || ' ').trim();
    if (v === 'Y') return '<span style="color:var(--green)">✓ Autorisé</span>';
    if (v === 'N') return '<span style="color:var(--red)">✗ Non autorisé</span>';
    return '<span style="color:var(--text-muted)">— Non renseigné</span>';
  };

  const editHint = locked ? '' : ' <span style="opacity:0.5">✎</span>';
  const editClass = locked ? 'val locked' : 'val editable';
  const editClick = (field) => locked
    ? `onclick="showToast('🔒 Modification impossible — billet sécurisé')"`
    : `onclick="editField('${field}')"`;

  document.getElementById('bp-card').innerHTML = `
    <div class="bp-header">
      <div class="bp-header-left">
        <div class="airline">${seg.carrier || '—'}</div>
        <div class="passenger">${d.fullName || '—'}</div>
      </div>
      <div class="bp-status">VALIDE</div>
    </div>

    <div class="bp-route">
      <div class="bp-airport">
        <div class="code">${seg.origin || '—'}</div>
        <div class="city">Départ</div>
      </div>
      <div class="bp-arrow">
        <div class="bp-arrow-line"></div>
        <div class="bp-arrow-label">${seg.carrier.trim()} ${seg.flight.trim()}</div>
      </div>
      <div class="bp-airport">
        <div class="code">${seg.dest || '—'}</div>
        <div class="city">Arrivée</div>
      </div>
    </div>

    <div class="bp-perforation"><div class="bp-perf-line"></div></div>

    <div id="security-banner" class="security-banner ${locked ? 'secured' : 'clear'}" style="margin:1rem 1.25rem 0">
      ${locked
        ? '<span class="sec-icon">🔒</span><div><strong>BILLET SÉCURISÉ — LECTURE SEULE</strong></div>'
        : '<span class="sec-icon">🔓</span><div><strong>AUCUNE CLÉ DE SÉCURITÉ</strong> — Les champs ✎ sont modifiables.</div>'
      }
    </div>

    <div class="bp-fields">
      <div class="bp-field">
        <label>Date de vol</label>
        <div class="val">${julianToDate(seg.julian)}</div>
      </div>
      <div class="bp-field">
        <label>Date d'émission</label>
        <div class="val">${d.issueDate || '—'}</div>
      </div>

      <div class="bp-field">
        <label>Siège${editHint}</label>
        <div class="${editClass}" id="disp-seat" ${editClick('seat')}>${seg.seat || '—'}</div>
      </div>

      <div class="bp-field">
        <label>Classe${editHint} <span class="modified-badge hidden" id="badge-class">MOD</span></label>
        <div class="${editClass}" id="disp-class" ${editClick('class')}>${classLabel(seg.cabin)}</div>
        <select id="edit-class" class="hidden" onchange="saveField('class')" onblur="cancelField('class')">
          <option value="F">F — Première classe</option>
          <option value="J">J — Affaires (long-courrier)</option>
          <option value="C">C — Affaires</option>
          <option value="W">W — Éco+ / Premium éco</option>
          <option value="S">S — Éco+ / Premium éco</option>
          <option value="Y">Y — Économique (plein tarif)</option>
          <option value="B">B — Économique</option>
          <option value="M">M — Économique</option>
          <option value="K">K — Économique</option>
          <option value="Q">Q — Économique</option>
          <option value="V">V — Économique</option>
          <option value="H">H — Économique</option>
          <option value="L">L — Économique</option>
          <option value="G">G — Économique</option>
          <option value="N">N — Économique</option>
          <option value="T">T — Économique</option>
          <option value="X">X — Économique</option>
        </select>
      </div>

      <div class="bp-field">
        <label>N° séquence</label>
        <div class="val">${seg.seq ? parseInt(seg.seq, 10) : '—'}</div>
      </div>

      <div class="bp-field">
        <label>Fast Track <span style="font-size:0.55rem;opacity:0.6">(item 254)</span></label>
        <div class="val">${ftLabel(seg.fastTrack)}</div>
      </div>

      <div class="bp-field full">
        <label>PNR / Référence réservation</label>
        <div class="val">${seg.pnr || d.pnr || '—'}</div>
      </div>

      ${d.ticketNum && d.ticketNum !== '—' ? `
      <div class="bp-field full">
        <label>Numéro de billet</label>
        <div class="val">${d.ticketNum}</div>
      </div>` : ''}
    </div>`;
}

function displayData() {
  const d = bcbpData;

  // Onglets segments
  const tabsEl = document.getElementById('seg-tabs');
  if (d.totalLegs > 1) {
    tabsEl.innerHTML = d.segments.map((seg, i) =>
      `<button class="seg-tab ${i === 0 ? 'active' : ''}" onclick="switchSeg(${i})">
        <span>Segment ${i + 1}</span>
        <span class="seg-route">${seg.origin}→${seg.dest}</span>
      </button>`
    ).join('');
    tabsEl.classList.remove('hidden');
  } else {
    tabsEl.classList.add('hidden');
  }

  bcbpData.activeSegIdx = 0;
  renderCard(0);

  // Bouton générer QR
  const btnQR = document.getElementById('btn-generate-qr');
  if (btnQR) btnQR.disabled = d.hasSecurityKey;

  document.getElementById('section-scan').classList.add('hidden');
  document.getElementById('section-data').classList.remove('hidden');
  document.getElementById('section-qr').classList.add('hidden');
}

function switchSeg(idx) {
  bcbpData.activeSegIdx = idx;
  document.querySelectorAll('.seg-tab').forEach((t, i) =>
    t.classList.toggle('active', i === idx));
  renderCard(idx);
}
function editField(field) {
  if (field === 'class') {
    const disp = document.getElementById('disp-class');
    const sel = document.getElementById('edit-class');
    disp.classList.add('hidden');
    sel.classList.remove('hidden');
    const seg = bcbpData.segments[bcbpData.activeSegIdx];
    sel.value = (seg.cabin || 'Y').trim();
    sel.focus();
  }
  if (field === 'seat') {
    const disp = document.getElementById('disp-seat');
    const seg  = bcbpData.segments[bcbpData.activeSegIdx];
    const input = document.createElement('input');
    input.type = 'text';
    input.value = seg.seat || '';
    input.maxLength = 4;
    input.style.cssText = 'width:100%;padding:0.5rem 0.65rem;background:var(--card);border:1px solid var(--accent);border-radius:7px;color:var(--accent);font-family:var(--mono);font-size:0.88rem;font-weight:600;outline:none;';
    disp.replaceWith(input);
    input.focus();
    input.id = 'edit-seat-input';
    input.addEventListener('blur', () => {
      const newVal = input.value.toUpperCase().padEnd(4, ' ').substring(0, 4);
      bcbpData.segments[bcbpData.activeSegIdx].seat = newVal;
      modifiedFields.add('seat');
      const newDiv = document.createElement('div');
      newDiv.className = 'val editable';
      newDiv.id = 'disp-seat';
      newDiv.textContent = newVal.trim();
      newDiv.onclick = () => editField('seat');
      input.replaceWith(newDiv);
      updateModifiedState();
      showToast('Siège modifié → ' + newVal.trim());
    });
    input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
  }
}

function saveField(field) {
  if (field === 'class') {
    const sel = document.getElementById('edit-class');
    const newClass = sel.value;
    bcbpData.segments[bcbpData.activeSegIdx].cabin = newClass;
    modifiedFields.add('class');
    const disp = document.getElementById('disp-class');
    disp.textContent = classLabel(newClass);
    disp.classList.remove('hidden');
    sel.classList.add('hidden');
    document.getElementById('badge-class').classList.remove('hidden');
    updateModifiedState();
    showToast('Classe modifiée → ' + classLabel(newClass));
  }
}

function cancelField(field) {
  if (field === 'class') {
    setTimeout(() => {
      const sel = document.getElementById('edit-class');
      if (!sel.classList.contains('hidden')) {
        document.getElementById('disp-class').classList.remove('hidden');
        sel.classList.add('hidden');
      }
    }, 200);
  }
}

function updateModifiedState() {
  const count = modifiedFields.size;
  const badge = document.getElementById('modified-count');
  if (count > 0) badge.classList.remove('hidden');
  else badge.classList.add('hidden');
}

// ─── QR GENERATION ───────────────────────────────────────────────
function generateQR() {
  if (bcbpData.hasSecurityKey) {
    showToast('🔒 Génération bloquée — billet sécurisé');
    return;
  }
  const d   = bcbpData;
  const seg = d.segments[0]; // toujours le segment 1 (positions fixes)
  let s = d.raw.split('');

  // Cabin class à pos 47, seat à pos 48-51 (positions correctes spec IATA)
  s[47] = (seg.cabin || 'Y')[0];
  const seat4 = (seg.seat + '    ').substring(0, 4);
  for (let i = 0; i < 4; i++) s[48 + i] = seat4[i];

  const newBCBP = s.join('');

  document.getElementById('section-data').classList.add('hidden');
  document.getElementById('section-qr').classList.remove('hidden');
  setStep(3);

  const container = document.getElementById('qr-output');
  container.innerHTML = '';
  new QRCode(container, {
    text: newBCBP, width: 220, height: 220,
    colorDark: '#000000', colorLight: '#FFFFFF',
    correctLevel: QRCode.CorrectLevel.M
  });
}

function downloadQR() {
  const canvas = document.querySelector('#qr-output canvas');
  if (!canvas) { showToast('Générer le QR d\'abord'); return; }
  const seg  = bcbpData.segments[0];
  const link = document.createElement('a');
  link.download = 'BCBP_' + (seg.carrier + seg.flight).replace(/\s/g, '_') + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('QR téléchargé');
}

// ─── NAV ──────────────────────────────────────────────────────────
function backToData() {
  document.getElementById('section-qr').classList.add('hidden');
  document.getElementById('section-data').classList.remove('hidden');
  setStep(2);
}

function reset() {
  document.getElementById('section-data').classList.add('hidden');
  document.getElementById('section-qr').classList.add('hidden');
  document.getElementById('section-scan').classList.remove('hidden');
  document.getElementById('manual-input').value = '';
  document.getElementById('qr-output').innerHTML = '';
  document.getElementById('modified-count').classList.add('hidden');
  document.getElementById('seg-tabs').classList.add('hidden');
  document.getElementById('bp-card').innerHTML = '';
  bcbpData = {}; rawString = ''; modifiedFields = new Set();
  setStep(1);
}

function setStep(n) {
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('step' + i);
    el.classList.remove('active', 'done');
    if (i < n) el.classList.add('done');
    else if (i === n) el.classList.add('active');
  }
}

// ─── HELPERS ──────────────────────────────────────────────────────
function julianToDate(julian) {
  if (!julian || julian.trim() === '' || julian === '000') return '—';
  const day = parseInt(julian, 10);
  if (isNaN(day) || day < 1 || day > 366) return julian;
  const year = new Date().getFullYear();
  const date = new Date(year, 0, day);
  return date.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function classLabel(code) {
  const map = {
    'F':'F — Première','A':'A — Première',
    'J':'J — Affaires','C':'C — Affaires','D':'D — Affaires',
    'I':'I — Affaires','Z':'Z — Affaires',
    'W':'W — Premium Éco','P':'P — Premium Éco','S':'S — Premium Éco',
    'Y':'Y — Économique','B':'B — Économique','M':'M — Économique',
    'K':'K — Économique','Q':'Q — Économique','V':'V — Économique',
    'H':'H — Économique','L':'L — Économique','G':'G — Économique',
    'N':'N — Économique','T':'T — Économique','X':'X — Économique',
    'U':'U — Navette','E':'E — Navette'
  };
  const c = (code || '').trim();
  return map[c] || (c ? c + ' — Inconnu' : '—');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.add('hidden'), 2800);
}

// ─── THEME TOGGLE ──────────────────────────────────────────────────
function applyThemeIcon() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  document.getElementById('theme-icon').textContent = isLight ? '☀' : '☾';
}

function toggleTheme() {
  const root = document.documentElement;
  const isLight = root.getAttribute('data-theme') === 'light';
  if (isLight) {
    root.removeAttribute('data-theme');
    localStorage.setItem('bcbp-theme', 'dark');
  } else {
    root.setAttribute('data-theme', 'light');
    localStorage.setItem('bcbp-theme', 'light');
  }
  applyThemeIcon();
}

// Init icône au chargement
applyThemeIcon();

// ─── TAB SWITCH ───────────────────────────────────────────────────
function switchTab(tab) {
  const isGen = tab === 'gen';
  document.getElementById('tab-reader').classList.toggle('active', !isGen);
  document.getElementById('tab-gen').classList.toggle('active', isGen);

  // Cacher toutes les sections lecteur
  ['section-scan','section-data','section-qr'].forEach(id => {
    document.getElementById(id).classList.add('hidden');
  });
  document.getElementById('section-gen').classList.toggle('hidden', !isGen);

  if (!isGen) {
    // Retour lecteur : remettre sur scan
    document.getElementById('section-scan').classList.remove('hidden');
    setStep(1);
  }
}

// ─── GÉNÉRATEUR BCBP ──────────────────────────────────────────────
function pad(str, len, char = ' ') {
  return (str + char.repeat(len)).substring(0, len);
}

function dateToJulian(dateStr) {
  if (!dateStr) return '000';
  const d = new Date(dateStr);
  const start = new Date(d.getFullYear(), 0, 0);
  const diff = d - start;
  const oneDay = 1000 * 60 * 60 * 24;
  const day = Math.floor(diff / oneDay);
  return String(day).padStart(3, '0');
}

function buildBCBP() {
  const lastName  = (document.getElementById('gen-lastname').value || 'UNKNOWN').toUpperCase();
  const firstName = (document.getElementById('gen-firstname').value || '').toUpperCase();
  const origin    = pad((document.getElementById('gen-origin').value || '   ').toUpperCase(), 3);
  const dest      = pad((document.getElementById('gen-dest').value || '   ').toUpperCase(), 3);
  const carrier   = pad((document.getElementById('gen-carrier').value || '  ').toUpperCase(), 3);
  const flight    = pad((document.getElementById('gen-flight').value || '    ').toUpperCase(), 5);
  const dateVal   = document.getElementById('gen-date').value;
  const julian    = dateToJulian(dateVal);
  const cabinCls  = document.getElementById('gen-class').value || 'Y';
  const seat      = pad((document.getElementById('gen-seat').value || '   ').toUpperCase(), 4);
  const seq       = String(parseInt(document.getElementById('gen-seq').value) || 1).padStart(4, '0') + ' ';
  const pnr       = pad((document.getElementById('gen-pnr').value || '      ').toUpperCase(), 7);
  const gate      = pad((document.getElementById('gen-gate').value || '   ').toUpperCase(), 3);
  const ftVal     = document.getElementById('gen-fasttrack').value || ' ';

  // Nom passager : format NOM/PRENOM sur 20 chars
  const nameField = pad(lastName + (firstName ? '/' + firstName : ''), 20);

  // ── Bloc conditionnel unique (items 7, 142...) ──
  // PNR 7 chars + gate 3 + padding 5 = 15 chars
  const condData = pnr + gate + '     ';
  const condSize = condData.length.toString(16).toUpperCase().padStart(2, '0');

  // ── Bloc conditionnel répété (items 18→254) ──
  // Structure : [>][version 1c][fieldSize 2c hex][rep data]
  // rep data (12 chars) :
  //   item 18  selectee   (1) = ' '
  //   item 19  mkt carrier(3) = '   '
  //   item 20  ff airline (3) = '   '
  //   item 236 ID/AD      (1) = ' '
  //   item 89  free bag   (3) = '   '
  //   item 254 fast track (1) = ftVal
  const repData   = ' ' + '   ' + '   ' + ' ' + '   ' + ftVal; // 12 chars
  const repSize   = repData.length.toString(16).toUpperCase().padStart(2, '0');
  const repBlock  = ftVal.trim() ? ('>' + '6' + repSize + repData) : '';

  // Construction chaîne BCBP format M
  const bcbp =
    'M' +          // format code
    '1' +          // 1 leg
    nameField +    // 20 chars
    'E' +          // e-ticket
    origin +       // 3
    dest +         // 3
    carrier +      // 3
    flight +       // 5
    julian +       // 3
    cabinCls +     // 1
    seat +         // 4
    seq +          // 5
    '0' +          // passenger status
    condSize +     // 2 hex
    condData +     // conditionnel unique
    repBlock;      // conditionnel répété (Fast Track)

  return bcbp;
}

  // Aperçu supprimé — fonction conservée pour les oninput des champs
}

function generateFromForm() {
  const lastName = document.getElementById('gen-lastname').value.trim();
  const origin   = document.getElementById('gen-origin').value.trim();
  const dest     = document.getElementById('gen-dest').value.trim();

  if (!lastName) { showToast('Nom de famille requis'); return; }
  if (origin.length !== 3) { showToast('Code aéroport départ : 3 lettres'); return; }
  if (dest.length !== 3)   { showToast('Code aéroport arrivée : 3 lettres'); return; }

  const bcbp = buildBCBP();

  const container = document.getElementById('gen-qr-output');
  container.innerHTML = '';

  new QRCode(container, {
    text: bcbp,
    width: 220,
    height: 220,
    colorDark: '#000000',
    colorLight: '#FFFFFF',
    correctLevel: QRCode.CorrectLevel.M
  });

  document.getElementById('gen-qr-section').classList.remove('hidden');
  document.getElementById('btn-dl-gen').style.display = 'flex';
  showToast('✓ QR Code généré');
}

function downloadGenQR() {
  const canvas = document.querySelector('#gen-qr-output canvas');
  if (!canvas) { showToast('Générer le QR d\'abord'); return; }
  const origin = document.getElementById('gen-origin').value || 'XXX';
  const dest   = document.getElementById('gen-dest').value || 'YYY';
  const link   = document.createElement('a');
  link.download = 'BCBP_' + origin + '_' + dest + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('QR téléchargé');
}
